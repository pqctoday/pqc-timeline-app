        <h1>
          <img class="si-logo" src="https://sae-static-content-prod.cl.sae.org/logos/svg/sae.svg" alt="SAE-ORG">
          <div class="si-loadspinner">

      <style>
        .si-loadpage {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 80vh; /* upper bias */
        }

        .si-loadpage h1 {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-size: 1.5rem;
        }

        .si-loadpage .si-logo {
          height: 12rem;
          max-width: 75%;
        }

        .si-loadspinner {
          margin-top: 1rem;
          display: flex;
          position: relative;
          width: 1.5rem;
          height: 1.5rem;
          animation: loadSpin 0.75s infinite linear;
        }

        .si-loadspinner svg {
          width: 100%;
          height: 100%;
        }

        .si-loadspinner__circle {
          fill: transparent;
          stroke: currentColor;
          stroke-dasharray: 10rem;
          stroke-dashoffset: 10rem;
          stroke-width: 10%;
        }

        @keyframes loadSpin {
          0% {
            transform: rotate(0deg);
          }

          100% {
            transform: rotate(360deg);
          }
        }
      </style>
