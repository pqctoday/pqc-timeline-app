Modern cryptography is fundamental to securing the financial ecosystem. The emergence of quantum computers capable of breaking current cryptographic methods presents a challenge to the entire financial ecosystem. Addressing this challenge requires a transition to post-quantum cryptography (PQC). This transition also presents an opportunity to enhance cryptography management practices. Achieving this complex goal requires immediate action and a coordinated effort involving industry peers, vendors, policymakers, and society.

gement practices. Achieving this complex goal requires immediate action and a coordinated effort involving industry peers, vendors, policymakers, and society.&nbsp;<\/p><p>The Quantum Safe Financial Forum (QSFF) is committed to supporting companies and policymakers in the transition to a quantum-safe financial sector. The Quantum Safe Financial Forum recognises the growing global awareness of the quantum threat. However, without a common approach, the financial industry could face increased complexity and costs.<\/p><p><strong>Cite this publication:<\/strong> Europol (2025), Quantum Safe Financial Forum \u2013 A Call to Action, Publications Office of the European Union, Luxembourg.<\/p>","summary":"Modern cryptography is fundamental to securing the financial ecosystem. The emergence of quantum computers capable of breaking current cryptographic methods presents a challenge to the entire financial ecosystem. Addressing this challenge requires a transition to post-quantum cryptography (PQC). This transition also presents an opportunity to enhance cryptography management practices. Achieving this complex goal requires immediate action and a coordinated effort...","entities":[{"id":70,"title":"European Cybercrime Centre (EC3)","redirectUrl":"\/about-europol\/european-cybercrime-centre-ec3"}],"documentType":[{"id":179,"title":"Report"}],"relatedContent":[{"id":5985,"type":"news","title":"Call for action: urgent plan needed to transition to post-quantum cryptography together","published":1738918801,"alias":"\/media-press\/newsroom\/news\/call-for-action-urgent-plan-needed-to-transition-to-post-quantum-cryptography-together","mainImage":{"alt":"Quantum Safe Financial Forum: A call to action","mimeType":"image\/jpeg","thumbs":[{"width":100,"height":56,"url":"\/cms\/sites\/default\/files\/styles\/100x\/public\/images\/quantum-forum-PR-preview.jpg?itok=szGLNEpx"},{"width":200,"height":113,"url":"\/cms\/sites\/default\/files\/styles\/200x\/public\/images\/quantum-forum-PR-prev
